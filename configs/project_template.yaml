# Copy this file for each experiment session.
# The expected input is 7 MP4 files, each with 4 isolated audio tracks.

project:
  session_id: "session_01"
  description: "Group dialogue study"

players:
  - label: "A"
    name: "Jordan"
  - label: "B"
    name: "Elis"
  - label: "C"
    name: "Anna"
  - label: "D"
    name: "Isaiah"

videos:
  data_dir: "data/videos"
  expected_files: 7

  # Audio stream indices inside every MP4. Track 0 is ffmpeg's 0:a:0,
  # track 1 is 0:a:1, and so on.
  audio_tracks:
    - index: 0
      player: "A"
    - index: 1
      player: "B"
    - index: 2
      player: "C"
    - index: 3
      player: "D"

  # offset_s is optional. Use it when files are sequential chunks and the
  # output CSV should have a global session clock.
  files:
    - file: "session_part1.mp4"
      offset_s: 0
    - file: "session_part2.mp4"
      offset_s: 1800
    - file: "session_part3.mp4"
      offset_s: 3600
    - file: "session_part4.mp4"
      offset_s: 5400
    - file: "session_part5.mp4"
      offset_s: 7200
    - file: "session_part6.mp4"
      offset_s: 9000
    - file: "session_part7.mp4"
      offset_s: 10800

transcription:
  whisper_model: "large-v3-turbo"
  language: "en"
  batch_size: 16
  compute_type: "float16"

visual:
  # Facial recognition and gaze-direction evidence for "speaking to whom".
  # Requires clear reference images for A/B/C/D.
  enabled: true
  sample_fps: 1.0
  identity_threshold: 0.35
  yaw_threshold: 12.0
  face_references:
    A: "data/faces/A.jpg"
    B: "data/faces/B.jpg"
    C: "data/faces/C.jpg"
    D: "data/faces/D.jpg"

hpc:
  partition: "gpu"
  time: "08:00:00"
  cpus: 8
  mem: "48G"
  gpus: 1

output:
  dir: "output"
